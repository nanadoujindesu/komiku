version: "3.8"

services:
  komiku-mirror:
    build: .
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - PORT=3000
      - MIRROR_DOMAIN=${MIRROR_DOMAIN:-localhost:3000}
      - MIRROR_PROTOCOL=${MIRROR_PROTOCOL:-http}
      - ORIGIN_HOST=komiku.org
      - ORIGIN_PROTOCOL=https
      - IMAGE_DOMAINS=cdn.komiku.co.id,komiku.co.id,i.komiku.org,thumbnail.komiku.org,update.komikid.org,i0.wp.com,i1.wp.com,i2.wp.com,i3.wp.com
      - CACHE_TTL_HTML=300
      - CACHE_TTL_ASSETS=86400
      - CACHE_TTL_IMAGES=604800
      - CACHE_MAX_ITEMS=2000
      - USE_BROWSER=${USE_BROWSER:-false}
    restart: unless-stopped
    # Limit memory to avoid OOM on small VPS
    deploy:
      resources:
        limits:
          memory: 1G
